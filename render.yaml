##################################################################
# SMEPRO360 — Render Infrastructure as Code
#
# Single Docker service:
#   • Stage 1 (Docker build): Node 20 compiles the React frontend
#   • Stage 2 (Docker run):   Python 3.12 FastAPI serves everything
#     - /api/v1/*  → FastAPI REST API
#     - /docs      → Swagger UI
#     - /health    → health check
#     - /*         → React SPA (served from /app/static_frontend)
#
# Render managed PostgreSQL — no Supabase needed.
# SQLAlchemy creates all tables + seeds on first startup.
##################################################################

databases:
  - name: smepro360-db
    databaseName: smepro360
    user: smepro360
    plan: free
    region: oregon

services:
  - type: web
    name: smepro360-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smepro360-db
          property: connectionString
      # SECRET_KEY must be set manually in the Render dashboard after deploy
      # (or set sync:false here to be prompted on blueprint apply)
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: APP_NAME
        value: SMEPRO360
      - key: APP_VERSION
        value: 1.0.0
      - key: FIRST_SUPERUSER
        value: admin@smepro360.com
      - key: FIRST_SUPERUSER_PASSWORD
        value: Admin@123456
      - key: BACKEND_CORS_ORIGINS
        value: '["https://smepro360-api.onrender.com","https://smepro360.com","https://www.smepro360.com","http://localhost:3000"]'
